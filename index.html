/* 2点間の距離(km)。GPSで一番近い出発地を選ぶために使う */
function distanceKm(lat1, lng1, lat2, lng2) {
  const R = 6371, toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1), dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

/* 同じエリア内でも最初の1歩には移動時間がかかる(ホテル→集合場所など) */
function localTravel(transport) {
  if (transport === "car")     return { mins:10, icon:"🚗", cost:0, en:"Drive from your starting point  ~10 min", ja:"出発地から車で 約10分", warn:false };
  if (transport === "transit") return { mins:15, icon:"🚌", cost:3, en:"Bus / rideshare from your starting point  ~15 min · ~$3", ja:"出発地からバス・配車で 約15分 · 約$3", warn:false };
  return { mins:15, icon:"🚶", cost:0, en:"Walk from your starting point  ~15 min · Free", ja:"出発地から徒歩で 約15分 · 無料", warn:false };
}

function travelInfo(fromA, toA, transport) {
  if (fromA === toA) return null;
  const base = DRIVE[fromA]?.[toA] ?? 45;
  let mins, icon, en, ja, warn = false, cost = 0;
  if (transport === "car") {
    mins = base; icon = "🚗"; cost = 0;
    en = `Drive  ~${mins} min  (rental already covers this)`; ja = `車で 約${mins}分(レンタカー代に含む)`;
  } else if (transport === "transit") {
    mins = Math.round(base * 1.5); icon = "🚌"; cost = 3;
    en = `TheBus / Uber  ~${mins} min  · ~$3`; ja = `バス・Uber  約${mins}分 · 約$3`;
    if (base >= 50) warn = true;
  } else {
    mins = base <= 20 ? Math.round(base * 2.5) : Math.round(base * 1.5);
    if (base <= 20) { icon = "🚲"; cost = 0; en = `Walk / bike  ~${mins} min  · Free`; ja = `徒歩・自転車  約${mins}分 · 無料`; }
    else { icon = "🚖"; cost = Math.round(mins * 1.8); en = `Uber / taxi  ~${mins} min  · ~$${Math.round(mins*1.8)}  (walking not practical)`; ja = `Uber・タクシー  約${mins}分 · 約$${Math.round(mins*1.8)}(徒歩は困難)`; warn = true; }
  }
  return { mins, icon, en, ja, warn, cost };
}

/* ---- utils ---- */
const parseTime = s => { if(!s) return 0; const [h,m]=s.split(":").map(Number); return h*60+m; };
const fmtTime = m => `${Math.floor(m/60)}:${String(m%60).padStart(2,"0")}`;

function scoreItem(item, area, party, ints, purpose) {
  let s = 0;
  if (item.area === area) s += 4;
  s += item.tags.filter(t => ints.includes(t)).length * 2;
  if (party === "family") s += item.fam;
  // キャリア目的: 継続的に開催される活動ほど時間を積み上げやすいので優先
  if (purpose === "career" && item.type === "volunteer") {
    if (item.recurring === "weekly") s += 3;
    else if (item.recurring === "monthly") s += 1;
  }
  return s;
}

/* ペース設定 */
const PACE_CFG = {
  easygoing:{ diffs:["easy"],         buffer:20, maxAct:2, boost:d=>d.diff==="easy"?2:0 },
  moderate: { diffs:["easy","medium"],buffer:10, maxAct:3, boost:()=>0                  },
  active:   { diffs:["easy","medium","hard"], buffer:0, maxAct:4, boost:d=>d.diff==="hard"?1:0 },
};

function buildPlan(area, party, ints, startMins, endMins, offset, pace, transport, purpose, planStyle, targetAreas) {
  const pc = PACE_CFG[pace] || PACE_CFG.moderate;
  const used = [], slots = [];
  let cur = startMins, curArea = area, actCount = 0;

  const remMins = () => endMins - cur;

  function getTrav(toArea) {
    return curArea === toArea ? null : travelInfo(curArea, toArea, transport);
  }
  function totalCost(item) {
    const trav = getTrav(item.area);
    const firstLeg = (!trav && slots.length === 0) ? localTravel(transport).mins : 0;
    return item.dur * 60 + (trav ? trav.mins : 0) + firstLeg + pc.buffer;
  }

  function pickBest(typeFilter) {
    const candidates = DATA
      .filter(d => {
        if (typeFilter && d.type !== typeFilter) return false;
        if (used.includes(d.id)) return false;
        if (!pc.diffs.includes(d.diff)) return false;
        // 「どこで活動したい?」で絞り込み(空配列=どこでも)
        if (targetAreas.length > 0 && !targetAreas.includes(d.area)) return false;
        // 「ほかに何をしたい?」で選ばれたスタイルに合うアクティビティだけ
        if (d.type === "activity" && d.style !== planStyle) return false;
        return totalCost(d) <= remMins();
      })
      .map(d => ({ d, s: scoreItem(d, area, party, ints, purpose) + pc.boost(d) - (d.area !== curArea ? 1 : 0) }))
      .sort((a, b) => b.s - a.s);
    if (!candidates.length) return null;
    return candidates[offset % candidates.length].d;
  }

  function addItem(item, give = false) {
    const trav = getTrav(item.area);
    if (trav) {
      slots.push({ time: fmtTime(cur), travelCard: true, ...trav });
      cur += trav.mins;
      curArea = item.area;
    } else if (slots.length === 0) {
      // 出発地から最初の予定へ。同じエリアでも移動時間はかかる
      const lt = localTravel(transport);
      slots.push({ time: fmtTime(cur), travelCard: true, ...lt });
      cur += lt.mins;
    }
    if (pc.buffer > 0 && slots.length > 0) cur += pc.buffer;
    slots.push({ time: fmtTime(cur), item, give });
    used.push(item.id);
    cur += item.dur * 60;
    return item;
  }

  // 1. Volunteer first
  if (remMins() >= 90) {
    const v = pickBest("volunteer");
    if (v) addItem(v, true);
  }

  // 2. Fill remaining
  let guard = 0;
  while (remMins() > 30 && guard++ < 10 && actCount <= pc.maxAct) {
    const hasFood = slots.some(s => s.item?.type === "food");
    if (!hasFood) {
      const f = pickBest("food");
      if (f) { addItem(f); continue; }
    }
    if (planStyle !== "food" && actCount < pc.maxAct) {
      const a = pickBest("activity");
      if (a) { addItem(a); actCount++; continue; }
    }
    break;
  }
  return slots;
}

function buildVolunteerList(area, party, ints, availH, pace, offset, purpose, targetAreas) {
  const pc = PACE_CFG[pace] || PACE_CFG.moderate;
  const ranked = DATA
    .filter(d => d.type === "volunteer" && pc.diffs.includes(d.diff) && d.dur <= availH
      && (targetAreas.length === 0 || targetAreas.includes(d.area)))
    .map(d => ({ d, s: scoreItem(d, area, party, ints, purpose) + pc.boost(d) }))
    .sort((a, b) => b.s - a.s)
    .map(x => x.d);
  if (!ranked.length) return [];
  const n = ranked.length, start = offset % n;
  return [...ranked.slice(start), ...ranked.slice(0, start)].slice(0, 3);
}

function BudgetSummary({ plan, t }) {
  const budget = plan.reduce((acc, s) => {
    if (s.travelCard) acc.transport += s.cost || 0;
    else if (s.item) {
      const key = s.item.type === "volunteer" ? "volunteer" : s.item.type === "food" ? "food" : "activity";
      acc[key] += s.item.cost || 0;
    }
    return acc;
  }, { volunteer: 0, food: 0, activity: 0, transport: 0 });
  const total = budget.volunteer + budget.food + budget.activity + budget.transport;
  const rows = [
    { key: "volunteer", color: C.leaf },
    { key: "food", color: C.sun },
    { key: "activity", color: C.sky },
    { key: "transport", color: C.fade },
  ].map(r => ({ ...r, label: t.budgetCat[r.key], val: budget[r.key] }));
  const max = Math.max(1, ...rows.map(r => r.val));

  const useMyLocation = () => {
    if (!navigator.geolocation) { setGpsMsg(t.gpsFail); return; }
    setGpsBusy(true); setGpsMsg("");
    navigator.geolocation.getCurrentPosition(
      pos => {
        const { latitude, longitude } = pos.coords;
        let best = START_POINTS[0], bestD = Infinity;

          const d = distanceKm(latitude, longitude, sp.lat, sp.lng);

  return (
    <div style={{ minHeight: "100vh", background: C.skyPale, fontFamily: "Poppins,sans-serif" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap');*{box-sizing:border-box;margin:0;padding:0}input[type=time],input[type=date]{font-family:inherit}
.app-shell{max-width:420px;margin:0 auto;padding-bottom:48px;}
@media (min-width:700px){ .app-shell{max-width:560px;} }
.mode-card{background:${C.white};border:2px solid ${C.line};cursor:pointer;transition:background 0.18s ease,border-color 0.18s ease;}
.mode-card-title,.mode-card-desc{transition:color 0.18s ease;}
.mode-card-plan:hover,.mode-card-plan:focus-visible{background:linear-gradient(110deg,${C.sky},#00D8EE);border-color:${C.sky};}
.mode-card-plan:hover .mode-card-title,.mode-card-plan:focus-visible .mode-card-title{color:${C.white};}
.mode-card-plan:hover .mode-card-desc,.mode-card-plan:focus-visible .mode-card-desc{color:rgba(255,255,255,0.9);}
.mode-card-vol:hover,.mode-card-vol:focus-visible{background:linear-gradient(110deg,${C.sky},#00D8EE);border-color:${C.sky};}
.mode-card-vol:hover .mode-card-title,.mode-card-vol:focus-visible .mode-card-title{color:${C.white};}
.mode-card-vol:hover .mode-card-desc,.mode-card-vol:focus-visible .mode-card-desc{color:rgba(255,255,255,0.9);}
`}</style>

      <div className="app-shell">

        {/* NAV */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center",
          padding: "13px 20px", background: `linear-gradient(100deg,${C.sky},${C.skyDark})`,
          position: "sticky", top: 0, zIndex: 10 }}>
          <button onClick={() => { setScreen("home"); setOpenId(null); }}
            style={{ fontWeight: 900, fontSize: 16, color: C.white, background: "none", border: "none", cursor: "pointer", letterSpacing: "-0.02em", fontFamily: "Poppins,sans-serif" }}>
            <span style={{ fontWeight: 300, letterSpacing: "0.06em", opacity: 0.88 }}>a&nbsp;little&nbsp;</span><span style={{ fontWeight: 900, fontSize: 20, color: C.sun, letterSpacing: "-0.02em" }}>V</span>
          </button>
          <button onClick={() => setLang(lang === "en" ? "ja" : "en")}
            style={{ fontSize: 11, fontWeight: 800, padding: "5px 12px", borderRadius: 999,
              border: "2px solid rgba(255,255,255,0.65)", color: C.white, background: "rgba(255,255,255,0.18)",
              cursor: "pointer", letterSpacing: "0.04em", fontFamily: "Poppins,sans-serif" }}>
            {lang === "en" ? "日本語" : "English"}
          </button>
        </div>

        {/* HOME */}
        {screen === "home" && (
          <div>
            <div style={{ background: `linear-gradient(140deg,${C.sky} 0%,#0DCDE8 55%,#00DDBF 100%)`, padding: "36px 24px 44px", borderRadius: "0 0 28px 28px" }}>
              {/* ---- ロゴ: a little / 巨大V / tagline ---- */}
              <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: "0.18em", color: "rgba(255,255,255,0.65)", marginBottom: 18 }}>{t.tag}</div>
              <div style={{ fontWeight: 300, fontSize: 16, letterSpacing: "0.08em", color: "rgba(255,255,255,0.82)", textTransform: "uppercase" }}>{t.h1}</div>
              <div style={{ fontWeight: 800, fontSize: 52, lineHeight: 1.15, color: C.sun, letterSpacing: "0.01em", margin: "8px 0 10px 0" }}>{t.bigWord}</div>
              <div style={{ fontWeight: 800, fontSize: 19, color: C.white, letterSpacing: "-0.01em", lineHeight: 1.3, marginBottom: 8 }}>{t.h1c}</div>
              
              <p style={{ fontSize: 14, color: "rgba(255,255,255,0.9)", lineHeight: 1.65, maxWidth: 320 }}>{t.sub}</p>
            </div>
            <div style={{ padding: "20px 20px 0" }}>
              <button onClick={() => setScreen("mode")}
                style={{ width: "100%", padding: "18px", borderRadius: 18, background: C.sun, color: C.sunText,
                  fontWeight: 900, fontSize: 16, border: "none", cursor: "pointer",
                  boxShadow: "0 8px 24px rgba(255,213,53,0.4)", letterSpacing: "-0.01em", fontFamily: "Poppins,sans-serif" }}>
                {t.start}
              </button>
              <p style={{ textAlign: "center", fontSize: 12, color: C.fade, marginTop: 8, fontWeight: 600 }}>{t.how}</p>
            </div>
            <div style={{ padding: "20px 20px 0", display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              {[
                { icon:"⏱", en:"Just 1–2 hrs",enb:"Any free window works.",ja:"たった1〜2時間",jab:"空き時間でOK。" },
                { icon:"🗓", en:"No full-day plan",enb:"Your free slot only.",ja:"1日計画は不要",jab:"空いてる時間帯だけ入れる。" },
                { icon:"🚗", en:"Travel included",enb:"Driving time in the plan.",ja:"移動も計算",jab:"移動時間込みでプランを作成。" },
                { icon:"🌴", en:"Pace options",enb:"Relaxed to active.",ja:"ペース選択あり",jab:"ゆったり〜アクティブで調整。" },
              ].map((c, i) => (
                <div key={i} style={{ background: C.white, borderRadius: 16, padding: "14px", border: `1.5px solid ${C.line}` }}>
                  <div style={{ fontSize: 22, marginBottom: 5 }}>{c.icon}</div>
                  <div style={{ fontWeight: 800, fontSize: 12, color: C.ink, marginBottom: 2 }}>{lang === "en" ? c.en : c.ja}</div>
                  <div style={{ fontSize: 11, color: C.fade, lineHeight: 1.4 }}>{lang === "en" ? c.enb : c.jab}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* MODE — 目的を選ぶ二択画面(ベースは統一・ホバーで色が変わる) */}
        {screen === "mode" && (
          <div style={{ padding: "24px 20px 0" }}>
            <button onClick={() => setScreen("home")}
              style={{ fontSize: 12, fontWeight: 700, color: C.fade, background: "none", border: "none", cursor: "pointer", padding: 0, marginBottom: 16, fontFamily: "Poppins,sans-serif" }}>
              {t.modeBack}
            </button>
            <h2 style={{ fontWeight: 900, fontSize: 24, color: C.ink, letterSpacing: "-0.02em", marginBottom: 20 }}>{t.modeTitle}</h2>

            <button className="mode-card mode-card-vol" onClick={() => { setMode("volunteer"); setScreen("form"); }}
              style={{ width: "100%", textAlign: "left", padding: "18px", borderRadius: 20, marginBottom: 14 }}>
              <div style={{ fontSize: 26, marginBottom: 8 }}>🙋</div>
              <div className="mode-card-title" style={{ fontWeight: 900, fontSize: 18, color: C.ink, marginBottom: 4, fontFamily: "Poppins,sans-serif" }}>{t.modeVolTitle}</div>
              <div className="mode-card-desc" style={{ fontSize: 13, color: C.fade, lineHeight: 1.5, fontFamily: "Poppins,sans-serif" }}>{t.modeVolDesc}</div>
            </button>

            <button className="mode-card mode-card-plan" onClick={() => { setMode("plan"); setScreen("form"); }}
              style={{ width: "100%", textAlign: "left", padding: "18px", borderRadius: 20 }}>
              <div style={{ fontSize: 26, marginBottom: 8 }}>🗺️</div>
              <div className="mode-card-title" style={{ fontWeight: 900, fontSize: 18, color: C.ink, marginBottom: 4, fontFamily: "Poppins,sans-serif" }}>{t.modePlanTitle}</div>
              <div className="mode-card-desc" style={{ fontSize: 13, color: C.fade, lineHeight: 1.5, fontFamily: "Poppins,sans-serif" }}>{t.modePlanDesc}</div>
            </button>
          </div>
        )}

        {/* FORM */}
        {screen === "form" && (
          <div style={{ padding: "20px 20px 0" }}>
            <h2 style={{ fontWeight: 900, fontSize: 24, color: C.ink, letterSpacing: "-0.02em", marginBottom: 20 }}>{t.fTitle}</h2>

            {/* time range */}
            <div style={{ background: C.white, borderRadius: 20, padding: "16px", border: `1.5px solid ${C.line}`, marginBottom: 14 }}>
              <div style={{ fontSize: 10, fontWeight: 800, color: C.sky, letterSpacing: "0.12em", marginBottom: 12 }}>{t.fTime}</div>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <div onClick={() => openPicker(startRef)}
                  style={{ flex: 1, minWidth: 0, minHeight: 48, display: "flex", alignItems: "center", padding: "0 10px", borderRadius: 12, border: `1.5px solid ${C.line}`, background: C.skyPale, cursor: "pointer" }}>
                  <input ref={startRef} type="time" value={startTime} onChange={e => setStartTime(e.target.value)}
                    style={{ width: "100%", minWidth: 0, minHeight: 46, border: "none", background: "transparent", fontSize: 17, fontWeight: 800, color: C.ink, fontFamily: "Poppins,sans-serif", outline: "none", cursor: "pointer" }} />
                </div>
                <span style={{ fontSize: 18, color: C.sky, fontWeight: 900 }}>→</span>
                <div onClick={() => openPicker(endRef)}
                  style={{ flex: 1, minWidth: 0, minHeight: 48, display: "flex", alignItems: "center", padding: "0 10px", borderRadius: 12, border: `1.5px solid ${C.line}`, background: C.skyPale, cursor: "pointer" }}>
                  <input ref={endRef} type="time" value={endTime} onChange={e => setEndTime(e.target.value)}
                    style={{ width: "100%", minWidth: 0, minHeight: 46, border: "none", background: "transparent", fontSize: 17, fontWeight: 800, color: C.ink, fontFamily: "Poppins,sans-serif", outline: "none", cursor: "pointer" }} />
                </div>
              </div>
              {availH > 0 && (
                <div style={{ marginTop: 10, display: "inline-flex", alignItems: "center", gap: 6, padding: "5px 12px", borderRadius: 999,
                  background: availH >= 1.5 ? C.skyLight : C.warn, border: `1.5px solid ${availH >= 1.5 ? C.sky : C.warnB}` }}>
                  <span style={{ fontSize: 12, fontWeight: 800, color: availH >= 1.5 ? C.skyDark : C.warnT, fontFamily: "Poppins,sans-serif" }}>
                    {availH >= 1.5 ? "✓ " : "⚠ "}{t.avail(availH % 1 === 0 ? availH : availH.toFixed(1))}
                  </span>
                </div>
              )}
              {availH > 0 && availH < 1.5 && <p style={{ marginTop: 6, fontSize: 11, color: C.warnT, fontFamily: "Poppins,sans-serif" }}>{t.tooShort}</p>}
            </div>

            {/* date optional */}
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 10, fontWeight: 800, color: C.sky, letterSpacing: "0.12em", marginBottom: 8 }}>{t.fDate}</div>
              <div onClick={() => openPicker(dateRef)}
                style={{ width: "100%", minHeight: 48, display: "flex", alignItems: "center", padding: "0 14px", borderRadius: 14, border: `1.5px solid ${C.line}`, background: C.white, cursor: "pointer" }}>
                <input ref={dateRef} type="date" value={date} onChange={e => setDate(e.target.value)}
                  style={{ width: "100%", minHeight: 46, border: "none", background: "transparent", fontSize: 16, color: C.ink, fontFamily: "Poppins,sans-serif", outline: "none", cursor: "pointer" }} />
              </div>
            </div>

            {/* starting point + GPS */}
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 10, fontWeight: 800, color: C.sky, letterSpacing: "0.12em", marginBottom: 8 }}>{t.fArea}</div>
              <button onClick={useMyLocation} disabled={gpsBusy}
                style={{ marginBottom: 9, padding: "7px 14px", borderRadius: 999, fontSize: 12, fontWeight: 800,
                  border: `2px solid ${C.sky}`, background: C.white, color: C.sky,
                  cursor: gpsBusy ? "wait" : "pointer", fontFamily: "Poppins,sans-serif" }}>
                {gpsBusy ? t.gpsSearching : t.gpsBtn}
              </button>
              {gpsMsg && (
                <p style={{ marginBottom: 8, fontSize: 11, color: C.fade, lineHeight: 1.5, fontFamily: "Poppins,sans-serif" }}>{gpsMsg}</p>
              )}
              <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
                {START_POINTS.map(sp => (
                  <Chip key={sp.id} label={lang === "ja" ? sp.ja : sp.en} active={startPoint === sp.id}
                    onClick={() => { setStartPoint(sp.id); setArea(sp.area); setGpsMsg(""); }} />
                ))}
              </div>
            </div>

            {/* where to volunteer — 複数選択・空=どこでも */}
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 10, fontWeight: 800, color: C.sky, letterSpacing: "0.12em", marginBottom: 8 }}>{t.fTarget}</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
                <Chip label={t.anywhere} active={targetAreas.length === 0} onClick={() => setTargetAreas([])} />
                {Object.entries(t.areas).map(([k, v]) => (
                  <Chip key={k} label={v} active={targetAreas.includes(k)}
                    onClick={() => setTargetAreas(p => p.includes(k) ? p.filter(x => x !== k) : [...p, k])} />
                ))}
              </div>
            </div>

            {/* party */}
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 10, fontWeight: 800, color: C.sky, letterSpacing: "0.12em", marginBottom: 8 }}>{t.fParty}</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
                {Object.entries(t.party).map(([k, v]) => <Chip key={k} label={v} active={party === k} onClick={() => setParty(k)} />)}
              </div>
            </div>

            {/* interests */}
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 10, fontWeight: 800, color: C.sky, letterSpacing: "0.12em", marginBottom: 8 }}>{t.fInt}</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
                {Object.entries(t.ints).map(([k, v]) => <Chip key={k} label={v} active={ints.includes(k)} onClick={() => toggleInt(k)} />)}
              </div>
            </div>

            {/* purpose — キャリア目的なら継続開催の活動を優先 */}
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 10, fontWeight: 800, color: C.sky, letterSpacing: "0.12em", marginBottom: 8 }}>{t.fPurpose}</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
                {Object.entries(t.purpose).map(([k, v]) => <Chip key={k} label={v} active={purpose === k} onClick={() => setPurpose(k)} />)}
              </div>
              <p style={{ marginTop: 7, fontSize: 11, color: C.fade, fontFamily: "Poppins,sans-serif" }}>{t.purposeHint[purpose]}</p>
            </div>

            {/* plan style — 1日プランモードのときだけ表示 */}
            {mode === "plan" && (
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 10, fontWeight: 800, color: C.sky, letterSpacing: "0.12em", marginBottom: 8 }}>{t.fPlanStyle}</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
                  {Object.entries(t.planStyleOpts).map(([k, v]) => <Chip key={k} label={v} active={planStyle === k} onClick={() => setPlanStyle(k)} />)}
                </div>
                <p style={{ marginTop: 7, fontSize: 11, color: C.fade, fontFamily: "Poppins,sans-serif" }}>{t.planStyleHint[planStyle]}</p>
                {planStyle === "active" && (
                  <p style={{ marginTop: 5, fontSize: 11, color: C.warnT, fontStyle: "italic", fontFamily: "Poppins,sans-serif" }}>{t.activeThin}</p>
                )}
              </div>
            )}

            {/* pace */}
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 10, fontWeight: 800, color: C.sky, letterSpacing: "0.12em", marginBottom: 8 }}>{t.fPace}</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
                {Object.entries(t.pace).map(([k, v]) => <Chip key={k} label={v} active={pace === k} onClick={() => setPace(k)} />)}
              </div>
              <p style={{ marginTop: 7, fontSize: 11, color: C.fade, fontFamily: "Poppins,sans-serif" }}>{t.paceHint[pace]}</p>
            </div>

            {/* transport */}
            <div style={{ marginBottom: 22 }}>
              <div style={{ fontSize: 10, fontWeight: 800, color: C.sky, letterSpacing: "0.12em", marginBottom: 8 }}>{t.fTransport}</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
                {Object.entries(t.transport).map(([k, v]) => <Chip key={k} label={v} active={transport === k} onClick={() => setTransport(k)} />)}
              </div>
              {/* North Shore warning */}
              {area === "north" && transport !== "car" && (
                <div style={{ marginTop: 8, padding: "8px 12px", borderRadius: 10, background: C.warn, border: `1px solid ${C.warnB}`, fontSize: 11, color: C.warnT, fontFamily: "Poppins,sans-serif" }}>
                  {t.carNote}
                </div>
              )}
            </div>

            <button onClick={() => { setScreen("plan"); setOffset(0); setOpenId(null); setShowBudget(false); }}
              disabled={availH <= 0}
              style={{ width: "100%", padding: "17px", borderRadius: 18,
                background: availH > 0 ? `linear-gradient(110deg,${C.sky},#00D8EE)` : "#ccc",
                color: C.white, fontWeight: 900, fontSize: 16, border: "none",
                cursor: availH > 0 ? "pointer" : "not-allowed",
                boxShadow: availH > 0 ? `0 8px 24px rgba(11,190,235,0.32)` : "none",
                letterSpacing: "-0.01em", fontFamily: "Poppins,sans-serif" }}>
              {t.build}
            </button>
          </div>
        )}

        {/* PLAN (mode: plan) */}
        {screen === "plan" && mode === "plan" && (
          <div style={{ padding: "20px 20px 0" }}>
            <div style={{ fontSize: 10, fontWeight: 800, color: C.sky, letterSpacing: "0.12em", marginBottom: 4 }}>{t.planTitle}</div>
            <div style={{ fontWeight: 900, fontSize: 20, color: C.ink, letterSpacing: "-0.02em", marginBottom: date ? 4 : 14 }}>
              {t.planSub(startTime, endTime, t.areas[area])}
            </div>
            {date && <p style={{ fontSize: 12, color: C.fade, marginBottom: 10, fontWeight: 600 }}>{date}</p>}

            {plan.length > 0 && (
              <div style={{ marginBottom: 14 }}>
                <button onClick={() => setShowBudget(!showBudget)}
                  style={{ width: "100%", textAlign: "left", padding: "10px 14px", borderRadius: 14,
                    background: showBudget ? C.white : C.skyPale, border: `1.5px solid ${C.line}`,
                    fontSize: 12, fontWeight: 800, color: C.sky, cursor: "pointer",
                    fontFamily: "Poppins,sans-serif", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span>{showBudget ? t.budgetToggleHide : t.budgetToggleShow}</span>
                  <span style={{ fontSize: 10, color: C.fade }}>{showBudget ? "" : "▾"}</span>
                </button>
                {showBudget && <div style={{ marginTop: 8 }}><BudgetSummary plan={plan} t={t} /></div>}
              </div>
            )}

            {/* pace note */}
            {pace === "easygoing" && (
              <div style={{ marginBottom: 10, padding: "7px 12px", borderRadius: 10, background: C.leafLight, border: `1px solid #9ADBB6`, fontSize: 11, color: C.leafDark, fontWeight: 600, fontFamily: "Poppins,sans-serif" }}>
                🌴 {t.easyNote}
              </div>
            )}
            {purpose === "career" && (
              <div style={{ marginBottom: 10, padding: "9px 12px", borderRadius: 10, background: C.skyLight, border: `1px solid ${C.sky}`, fontSize: 11, color: C.skyDark, fontWeight: 600, lineHeight: 1.5, fontFamily: "Poppins,sans-serif" }}>
                {t.careerNote}
              </div>
            )}
            {!hasVol && (
              <div style={{ background: C.warn, border: `1.5px solid ${C.warnB}`, borderRadius: 14, padding: "10px 14px", marginBottom: 12, fontSize: 12, color: C.warnT, lineHeight: 1.5, fontFamily: "Poppins,sans-serif" }}>
                ⚠️ {t.noVol}
              </div>
            )}
            {onlyVolunteer && (
              <div style={{ background: C.skyLight, border: `1.5px solid ${C.sky}`, borderRadius: 14, padding: "10px 14px", marginBottom: 12, fontSize: 12, color: C.skyDark, lineHeight: 1.5, fontWeight: 600, fontFamily: "Poppins,sans-serif" }}>
                ⏳ {t.onlyVolNote}
              </div>
            )}
            {noFoodButHasMore && planStyle !== "food" && (
              <div style={{ background: C.skyLight, border: `1.5px solid ${C.sky}`, borderRadius: 14, padding: "10px 14px", marginBottom: 12, fontSize: 12, color: C.skyDark, lineHeight: 1.5, fontWeight: 600, fontFamily: "Poppins,sans-serif" }}>
                ⏳ {t.onlyVolNoteFood}
              </div>
            )}

            {plan.map((slot, i) => slot.travelCard
              ? <TravelCard key={i} slot={slot} lang={lang} />
              : <PlanCard key={i} slot={slot} t={t} lang={lang} openId={openId} setOpenId={setOpenId} />
            )}

            {/* end marker */}
            {plan.length > 0 && (
              <div style={{ display: "flex", gap: 10, marginBottom: 8 }}>
                <div style={{ width: 44, fontSize: 11, fontWeight: 800, color: C.sky, fontFamily: "Poppins,sans-serif", paddingTop: 2, textAlign: "center" }}>{endTime}</div>
                <div style={{ flex: 1, padding: "8px 14px", borderRadius: 12, background: C.skyLight, border: `1px solid ${C.line}`, fontSize: 12, fontWeight: 700, color: C.skyDark, fontFamily: "Poppins,sans-serif" }}>{t.endLabel}</div>
              </div>
            )}

            {plan.length > 0 && (
              <p style={{ fontSize: 10, color: C.fade, lineHeight: 1.5, marginTop: 10, marginBottom: 2, fontFamily: "Poppins,sans-serif" }}>
                🗺️ {t.travelNote}
              </p>
            )}

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginTop: 14 }}>
              <button onClick={() => { setOffset(offset + 1); setOpenId(null); }}
                style={{ padding: "14px", borderRadius: 16, fontWeight: 800, fontSize: 12, border: `2px solid ${C.sky}`, color: C.sky, background: C.white, cursor: "pointer", fontFamily: "Poppins,sans-serif" }}>
                {t.shuffle}
              </button>
              <button onClick={() => setScreen("form")}
                style={{ padding: "14px", borderRadius: 16, fontWeight: 800, fontSize: 12, background: `linear-gradient(110deg,${C.sky},#00D8EE)`, color: C.white, border: "none", cursor: "pointer", fontFamily: "Poppins,sans-serif" }}>
                {t.back}
              </button>
            </div>
          </div>
        )}

        {/* PLAN (mode: volunteer) — ボランティア候補リスト */}
        {screen === "plan" && mode === "volunteer" && (
          <div style={{ padding: "20px 20px 0" }}>
            <div style={{ fontSize: 10, fontWeight: 800, color: C.sky, letterSpacing: "0.12em", marginBottom: 4 }}>{t.volResultsTitle}</div>
            <div style={{ fontWeight: 900, fontSize: 20, color: C.ink, letterSpacing: "-0.02em", marginBottom: date ? 4 : 14 }}>
              {t.planSub(startTime, endTime, t.areas[area])}
            </div>
            {date && <p style={{ fontSize: 12, color: C.fade, marginBottom: 10, fontWeight: 600 }}>{date}</p>}

            {purpose === "career" && (
              <div style={{ marginBottom: 10, padding: "9px 12px", borderRadius: 10, background: C.skyLight, border: `1px solid ${C.sky}`, fontSize: 11, color: C.skyDark, fontWeight: 600, lineHeight: 1.5, fontFamily: "Poppins,sans-serif" }}>
                {t.careerNote}
              </div>
            )}
            {pace === "easygoing" && (
              <div style={{ marginBottom: 10, padding: "7px 12px", borderRadius: 10, background: C.leafLight, border: "1px solid #9ADBB6", fontSize: 11, color: C.leafDark, fontWeight: 600, fontFamily: "Poppins,sans-serif" }}>
                🌴 {t.easyNote}
              </div>
            )}

            {volList.length === 0 && (
              <div style={{ background: C.warn, border: `1.5px solid ${C.warnB}`, borderRadius: 14, padding: "10px 14px", marginBottom: 12, fontSize: 12, color: C.warnT, lineHeight: 1.5, fontFamily: "Poppins,sans-serif" }}>
                ⚠️ {t.volNone}
              </div>
            )}

            {volList.map(item => (
              <VolunteerOptionCard key={item.id} item={item} t={t} lang={lang} openId={openId} setOpenId={setOpenId} fromArea={area} transport={transport} />
            ))}

            {volList.length > 0 && (
              <p style={{ fontSize: 10, color: C.fade, lineHeight: 1.5, marginTop: 4, marginBottom: 2, fontFamily: "Poppins,sans-serif" }}>
                🗺️ {t.travelNote}
              </p>
            )}

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginTop: 14 }}>
              <button onClick={() => { setOffset(offset + 1); setOpenId(null); }}
                style={{ padding: "14px", borderRadius: 16, fontWeight: 800, fontSize: 12, border: `2px solid ${C.sky}`, color: C.sky, background: C.white, cursor: "pointer", fontFamily: "Poppins,sans-serif" }}>
                {t.shuffle}
              </button>
              <button onClick={() => setScreen("form")}
                style={{ padding: "14px", borderRadius: 16, fontWeight: 800, fontSize: 12, background: `linear-gradient(110deg,${C.sky},#00D8EE)`, color: C.white, border: "none", cursor: "pointer", fontFamily: "Poppins,sans-serif" }}>
                {t.back}
              </button>
            </div>
          </div>
        )}

        <p style={{ textAlign: "center", fontSize: 10, color: C.line, marginTop: 28, padding: "0 20px", lineHeight: 1.6, fontWeight: 600 }}>{t.foot}</p>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
