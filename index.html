/* ---- 移動時間(車/分) ---- */
const DRIVE = {
  waikiki:{ waikiki:0, honolulu:20, east:45, north:60 },
  honolulu:{ waikiki:20, honolulu:0, east:35, north:55 },
  east:   { waikiki:45, honolulu:35, east:0,  north:90 },
  north:  { waikiki:60, honolulu:55, east:90, north:0  },
};

function travelInfo(fromA, toA, transport) {
  if (fromA === toA) return null;
  const base = DRIVE[fromA]?.[toA] ?? 45;
  let mins, icon, en, ja, warn = false;
  if (transport === "car") {
    mins = base; icon = "🚗";
    en = `Drive  ~${mins} min`; ja = `車で 約${mins}分`;
  } else if (transport === "transit") {
    mins = Math.round(base * 1.5); icon = "🚌";
    en = `TheBus / Uber  ~${mins} min`; ja = `バス・Uber  約${mins}分`;
    if (base >= 50) warn = true;
  } else {
    mins = base <= 20 ? Math.round(base * 2.5) : Math.round(base * 1.5);
    if (base <= 20) { icon = "🚲"; en = `Walk / bike  ~${mins} min`; ja = `徒歩・自転車  約${mins}分`; }
    else { icon = "🚖"; en = `Uber / taxi  ~${mins} min  (walking not practical)`; ja = `Uber・タクシー  約${mins}分 (徒歩は困難)`; warn = true; }
  }
  return { mins, icon, en, ja, warn };
}

/* ---- utils ---- */
const parseTime = s => { if(!s) return 0; const [h,m]=s.split(":").map(Number); return h*60+m; };
const fmtTime = m => `${Math.floor(m/60)}:${String(m%60).padStart(2,"0")}`;

function scoreItem(item, area, party, ints) {
  let s = 0;
  if (item.area === area) s += 4;
  s += item.tags.filter(t => ints.includes(t)).length * 2;
  if (party === "family") s += item.fam;
  return s;
}

/* ペース設定 */
const PACE_CFG = {
  easygoing:{ diffs:["easy"],         buffer:20, maxAct:2, boost:d=>d.diff==="easy"?2:0 },
  moderate: { diffs:["easy","medium"],buffer:10, maxAct:3, boost:()=>0                  },
  active:   { diffs:["easy","medium","hard"], buffer:0, maxAct:4, boost:d=>d.diff==="hard"?1:0 },
};

function buildPlan(area, party, ints, startMins, endMins, offset, pace, transport) {
  const pc = PACE_CFG[pace] || PACE_CFG.moderate;
  const used = [], slots = [];
  let cur = startMins, curArea = area, actCount = 0;

  const remMins = () => endMins - cur;

  function getTrav(toArea) {
    return curArea === toArea ? null : travelInfo(curArea, toArea, transport);
  }
  function totalCost(item) {
    const trav = getTrav(item.area);
    return item.dur * 60 + (trav ? trav.mins : 0) + pc.buffer;
  }

  function pickBest(typeFilter) {
    const candidates = DATA
      .filter(d => {
        if (typeFilter && d.type !== typeFilter) return false;
        if (used.includes(d.id)) return false;
        if (!pc.diffs.includes(d.diff)) return false;
        return totalCost(d) <= remMins();
      })
      .map(d => ({ d, s: scoreItem(d, area, party, ints) + pc.boost(d) - (d.area !== curArea ? 1 : 0) }))
      .sort((a, b) => b.s - a.s);
    if (!candidates.length) return null;
    return candidates[offset % candidates.length].d;
  }

  function addItem(item, give = false) {
    const trav = getTrav(item.area);
    if (trav) {
      slots.push({ time: fmtTime(cur), travelCard: true, ...trav });
      cur += trav.mins;
      curArea = item.area;
    }
    if (pc.buffer > 0 && slots.length > 0) cur += pc.buffer;
    slots.push({ time: fmtTime(cur), item, give });
    used.push(item.id);
    cur += item.dur * 60;
    return item;
  }

  // 1. Volunteer first
  if (remMins() >= 90) {
    const v = pickBest("volunteer");
    if (v) addItem(v, true);
  }

  // 2. Fill remaining
  let guard = 0;
  while (remMins() > 30 && guard++ < 10 && actCount <= pc.maxAct) {
    const hasFood = slots.some(s => s.item?.type === "food");
    if (!hasFood) {
      const f = pickBest("food");
      if (f) { addItem(f); continue; }
    }
    if (actCount < pc.maxAct) {
      const a = pickBest("activity");
      if (a) { addItem(a); actCount++; continue; }
    }
    break;
  }
  return slots;
}

function App() {
  const [lang, setLang] = useState("en");
  const [screen, setScreen] = useState("home");
  const [date, setDate] = useState("");
  const [startTime, setStartTime] = useState("09:00");
  const [endTime, setEndTime] = useState("12:00");
  const [area, setArea] = useState("waikiki");
  const [party, setParty] = useState("family");
  const [ints, setInts] = useState(["ocean"]);
  const [pace, setPace] = useState("moderate");
  const [transport, setTransport] = useState("transit");
  const [offset, setOffset] = useState(0);
  const [openId, setOpenId] = useState(null);
  const t = T[lang];

  const startMins = parseTime(startTime), endMins = parseTime(endTime);
  const availH = endMins > startMins ? (endMins - startMins) / 60 : 0;
  const toggleInt = k => setInts(p => p.includes(k) ? p.filter(x => x !== k) : [...p, k]);

  const plan = screen === "plan" ? buildPlan(area, party, ints, startMins, endMins, offset, pace, transport) : [];
  const hasVol = plan.some(s => s.give);
  const showNorthWarn = area === "north" && transport !== "car";

  return (
    <div style={{ minHeight: "100vh", background: C.skyPale, fontFamily: "Poppins,sans-serif" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap');*{box-sizing:border-box;margin:0;padding:0}input[type=time],input[type=date]{-webkit-appearance:none}`}</style>

      <div style={{ maxWidth: 420, margin: "0 auto", paddingBottom: 48 }}>

        {/* NAV */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center",
          padding: "13px 20px", background: `linear-gradient(100deg,${C.sky},${C.skyDark})`,
          position: "sticky", top: 0, zIndex: 10 }}>
          <button onClick={() => { setScreen("home"); setOpenId(null); }}
            style={{ fontWeight: 900, fontSize: 16, color: C.white, background: "none", border: "none", cursor: "pointer", letterSpacing: "-0.02em", fontFamily: "Poppins,sans-serif" }}>
            <span style={{ fontWeight: 300, letterSpacing: "0.06em", opacity: 0.88 }}>a&nbsp;little&nbsp;</span><span style={{ fontWeight: 900, fontSize: 20, color: C.sun, letterSpacing: "-0.02em" }}>V</span>
          </button>
          <button onClick={() => setLang(lang === "en" ? "ja" : "en")}
            style={{ fontSize: 11, fontWeight: 800, padding: "5px 12px", borderRadius: 999,
              border: "2px solid rgba(255,255,255,0.65)", color: C.white, background: "rgba(255,255,255,0.18)",
              cursor: "pointer", letterSpacing: "0.04em", fontFamily: "Poppins,sans-serif" }}>
            {lang === "en" ? "日本語" : "English"}
          </button>
        </div>

        {/* HOME */}
        {screen === "home" && (
          <div>
            <div style={{ background: `linear-gradient(140deg,${C.sky} 0%,#0DCDE8 55%,#00DDBF 100%)`, padding: "36px 24px 44px", borderRadius: "0 0 28px 28px" }}>
              {/* ---- ロゴ: a little / 巨大V / tagline ---- */}
              <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: "0.18em", color: "rgba(255,255,255,0.65)", marginBottom: 18 }}>{t.tag}</div>
              <div style={{ fontWeight: 300, fontSize: 17, letterSpacing: "0.06em", color: "rgba(255,255,255,0.85)" }}>{t.h1} {t.h1b}</div>
              <div style={{ fontWeight: 900, fontSize: 108, lineHeight: 0.82, color: C.sun, letterSpacing: "-0.07em", margin: "4px 0 8px -5px" }}>V</div>
              <div style={{ fontWeight: 800, fontSize: 21, color: C.white, letterSpacing: "-0.02em", lineHeight: 1.2, marginBottom: 6 }}>{t.h1c}</div>
              <div style={{ fontSize: 11, fontWeight: 600, color: "rgba(255,255,255,0.72)", letterSpacing: "0.04em", marginBottom: 20 }}>{t.vnote}</div>
              <p style={{ fontSize: 14, color: "rgba(255,255,255,0.9)", lineHeight: 1.65, maxWidth: 320 }}>{t.sub}</p>
            </div>
            <div style={{ padding: "20px 20px 0" }}>
              <button onClick={() => setScreen("form")}
                style={{ width: "100%", padding: "18px", borderRadius: 18, background: C.sun, color: C.sunText,
                  fontWeight: 900, fontSize: 16, border: "none", cursor: "pointer",
                  boxShadow: "0 8px 24px rgba(255,213,53,0.4)", letterSpacing: "-0.01em", fontFamily: "Poppins,sans-serif" }}>
                {t.start}
              </button>
              <p style={{ textAlign: "center", fontSize: 12, color: C.fade, marginTop: 8, fontWeight: 600 }}>{t.how}</p>
            </div>
            <div style={{ padding: "20px 20px 0", display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              {[
                { icon:"⏱", en:"Just 1–2 hrs",enb:"Any free window works.",ja:"たった1〜2時間",jab:"空き時間でOK。" },
                { icon:"🗓", en:"No full-day plan",enb:"Your free slot only.",ja:"1日計画は不要",jab:"空いてる時間帯だけ入れる。" },
                { icon:"🚗", en:"Travel included",enb:"Driving time in the plan.",ja:"移動も計算",jab:"移動時間込みでプランを作成。" },
                { icon:"🌴", en:"Pace options",enb:"Relaxed to active.",ja:"ペース選択あり",jab:"ゆったり〜アクティブで調整。" },
              ].map((c, i) => (
                <div key={i} style={{ background: C.white, borderRadius: 16, padding: "14px", border: `1.5px solid ${C.line}` }}>
                  <div style={{ fontSize: 22, marginBottom: 5 }}>{c.icon}</div>
                  <div style={{ fontWeight: 800, fontSize: 12, color: C.ink, marginBottom: 2 }}>{lang === "en" ? c.en : c.ja}</div>
                  <div style={{ fontSize: 11, color: C.fade, lineHeight: 1.4 }}>{lang === "en" ? c.enb : c.jab}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* FORM */}
        {screen === "form" && (
          <div style={{ padding: "20px 20px 0" }}>
            <h2 style={{ fontWeight: 900, fontSize: 24, color: C.ink, letterSpacing: "-0.02em", marginBottom: 20 }}>{t.fTitle}</h2>

            {/* time range */}
            <div style={{ background: C.white, borderRadius: 20, padding: "16px", border: `1.5px solid ${C.line}`, marginBottom: 14 }}>
              <div style={{ fontSize: 10, fontWeight: 800, color: C.sky, letterSpacing: "0.12em", marginBottom: 12 }}>{t.fTime}</div>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <input type="time" value={startTime} onChange={e => setStartTime(e.target.value)}
                  style={{ flex: 1, padding: "10px 10px", borderRadius: 12, border: `1.5px solid ${C.line}`, fontSize: 17, fontWeight: 800, color: C.ink, background: C.skyPale, fontFamily: "Poppins,sans-serif", outline: "none" }} />
                <span style={{ fontSize: 18, color: C.sky, fontWeight: 900 }}>→</span>
                <input type="time" value={endTime} onChange={e => setEndTime(e.target.value)}
                  style={{ flex: 1, padding: "10px 10px", borderRadius: 12, border: `1.5px solid ${C.line}`, fontSize: 17, fontWeight: 800, color: C.ink, background: C.skyPale, fontFamily: "Poppins,sans-serif", outline: "none" }} />
              </div>
              {availH > 0 && (
                <div style={{ marginTop: 10, display: "inline-flex", alignItems: "center", gap: 6, padding: "5px 12px", borderRadius: 999,
                  background: availH >= 1.5 ? C.skyLight : C.warn, border: `1.5px solid ${availH >= 1.5 ? C.sky : C.warnB}` }}>
                  <span style={{ fontSize: 12, fontWeight: 800, color: availH >= 1.5 ? C.skyDark : C.warnT, fontFamily: "Poppins,sans-serif" }}>
                    {availH >= 1.5 ? "✓ " : "⚠ "}{t.avail(availH % 1 === 0 ? availH : availH.toFixed(1))}
                  </span>
                </div>
              )}
              {availH > 0 && availH < 1.5 && <p style={{ marginTop: 6, fontSize: 11, color: C.warnT, fontFamily: "Poppins,sans-serif" }}>{t.tooShort}</p>}
            </div>

            {/* date optional */}
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 10, fontWeight: 800, color: C.sky, letterSpacing: "0.12em", marginBottom: 8 }}>{t.fDate}</div>
              <input type="date" value={date} onChange={e => setDate(e.target.value)}
                style={{ width: "100%", padding: "10px 14px", borderRadius: 14, border: `1.5px solid ${C.line}`, fontSize: 14, color: C.ink, background: C.white, fontFamily: "Poppins,sans-serif", outline: "none" }} />
            </div>

            {/* area + party */}
            {[
              { label: t.fArea, opts: Object.entries(t.areas), val: area, set: setArea },
              { label: t.fParty, opts: Object.entries(t.party), val: party, set: setParty },
            ].map(({ label, opts, val, set }, i) => (
              <div key={i} style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 10, fontWeight: 800, color: C.sky, letterSpacing: "0.12em", marginBottom: 8 }}>{label}</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
                  {opts.map(([k, v]) => <Chip key={k} label={v} active={val === k} onClick={() => set(k)} />)}
                </div>
              </div>
            ))}

            {/* interests */}
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 10, fontWeight: 800, color: C.sky, letterSpacing: "0.12em", marginBottom: 8 }}>{t.fInt}</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
                {Object.entries(t.ints).map(([k, v]) => <Chip key={k} label={v} active={ints.includes(k)} onClick={() => toggleInt(k)} />)}
              </div>
            </div>

            {/* pace */}
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 10, fontWeight: 800, color: C.sky, letterSpacing: "0.12em", marginBottom: 8 }}>{t.fPace}</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
                {Object.entries(t.pace).map(([k, v]) => <Chip key={k} label={v} active={pace === k} onClick={() => setPace(k)} />)}
              </div>
              <p style={{ marginTop: 7, fontSize: 11, color: C.fade, fontFamily: "Poppins,sans-serif" }}>{t.paceHint[pace]}</p>
            </div>

            {/* transport */}
            <div style={{ marginBottom: 22 }}>
              <div style={{ fontSize: 10, fontWeight: 800, color: C.sky, letterSpacing: "0.12em", marginBottom: 8 }}>{t.fTransport}</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
                {Object.entries(t.transport).map(([k, v]) => <Chip key={k} label={v} active={transport === k} onClick={() => setTransport(k)} />)}
              </div>
              {/* North Shore warning */}
              {area === "north" && transport !== "car" && (
                <div style={{ marginTop: 8, padding: "8px 12px", borderRadius: 10, background: C.warn, border: `1px solid ${C.warnB}`, fontSize: 11, color: C.warnT, fontFamily: "Poppins,sans-serif" }}>
                  {t.carNote}
                </div>
              )}
            </div>

            <button onClick={() => { setScreen("plan"); setOffset(0); setOpenId(null); }}
              disabled={availH <= 0}
              style={{ width: "100%", padding: "17px", borderRadius: 18,
                background: availH > 0 ? `linear-gradient(110deg,${C.sky},#00D8EE)` : "#ccc",
                color: C.white, fontWeight: 900, fontSize: 16, border: "none",
                cursor: availH > 0 ? "pointer" : "not-allowed",
                boxShadow: availH > 0 ? `0 8px 24px rgba(11,190,235,0.32)` : "none",
                letterSpacing: "-0.01em", fontFamily: "Poppins,sans-serif" }}>
              {t.build}
            </button>
          </div>
        )}

        {/* PLAN */}
        {screen === "plan" && (
          <div style={{ padding: "20px 20px 0" }}>
            <div style={{ fontSize: 10, fontWeight: 800, color: C.sky, letterSpacing: "0.12em", marginBottom: 4 }}>{t.planTitle}</div>
            <div style={{ fontWeight: 900, fontSize: 20, color: C.ink, letterSpacing: "-0.02em", marginBottom: date ? 4 : 14 }}>
              {t.planSub(startTime, endTime, t.areas[area])}
            </div>
            {date && <p style={{ fontSize: 12, color: C.fade, marginBottom: 10, fontWeight: 600 }}>{date}</p>}

            {/* pace note */}
            {pace === "easygoing" && (
              <div style={{ marginBottom: 10, padding: "7px 12px", borderRadius: 10, background: C.leafLight, border: `1px solid #9ADBB6`, fontSize: 11, color: C.leafDark, fontWeight: 600, fontFamily: "Poppins,sans-serif" }}>
                🌴 {t.easyNote}
              </div>
            )}
            {!hasVol && (
              <div style={{ background: C.warn, border: `1.5px solid ${C.warnB}`, borderRadius: 14, padding: "10px 14px", marginBottom: 12, fontSize: 12, color: C.warnT, lineHeight: 1.5, fontFamily: "Poppins,sans-serif" }}>
                ⚠️ {t.noVol}
              </div>
            )}

            {plan.map((slot, i) => slot.travelCard
              ? <TravelCard key={i} slot={slot} lang={lang} />
              : <PlanCard key={i} slot={slot} t={t} lang={lang} openId={openId} setOpenId={setOpenId} />
            )}

            {/* end marker */}
            {plan.length > 0 && (
              <div style={{ display: "flex", gap: 10, marginBottom: 8 }}>
                <div style={{ width: 44, fontSize: 11, fontWeight: 800, color: C.sky, fontFamily: "Poppins,sans-serif", paddingTop: 2, textAlign: "center" }}>{endTime}</div>
                <div style={{ flex: 1, padding: "8px 14px", borderRadius: 12, background: C.skyLight, border: `1px solid ${C.line}`, fontSize: 12, fontWeight: 700, color: C.skyDark, fontFamily: "Poppins,sans-serif" }}>{t.endLabel}</div>
              </div>
            )}

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginTop: 14 }}>
              <button onClick={() => { setOffset(offset + 1); setOpenId(null); }}
                style={{ padding: "14px", borderRadius: 16, fontWeight: 800, fontSize: 12, border: `2px solid ${C.sky}`, color: C.sky, background: C.white, cursor: "pointer", fontFamily: "Poppins,sans-serif" }}>
                {t.shuffle}
              </button>
              <button onClick={() => setScreen("form")}
                style={{ padding: "14px", borderRadius: 16, fontWeight: 800, fontSize: 12, background: `linear-gradient(110deg,${C.sky},#00D8EE)`, color: C.white, border: "none", cursor: "pointer", fontFamily: "Poppins,sans-serif" }}>
                {t.back}
              </button>
            </div>
          </div>
        )}

        <p style={{ textAlign: "center", fontSize: 10, color: C.line, marginTop: 28, padding: "0 20px", lineHeight: 1.6, fontWeight: 600 }}>{t.foot}</p>
      </div>
    </div>
  );
}

</script>
</body>
</html>
